<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カンチョー・ダッシュ</title>
<style>
  :root {
    --bg: #111216;
    --surface: #1a1d24;
    --surface-2: #222733;
    --line: #343a46;
    --text: #f6f1e8;
    --muted: #a7abb6;
    --accent: #ff5a5f;
    --accent-2: #19c6b6;
    --gold: #ffd166;
    --lime: #9dd866;
    --ink: #111216;
    --shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background:
      linear-gradient(135deg, rgba(255, 90, 95, 0.10), transparent 30%),
      linear-gradient(225deg, rgba(25, 198, 182, 0.12), transparent 34%),
      var(--bg);
    color: var(--text);
    font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
  }

  body {
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  button,
  input {
    font: inherit;
  }

  button {
    border: 0;
  }

  #app {
    width: min(100%, 1040px);
    margin: 0 auto;
    padding: 18px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 16px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .brand-main {
    font-size: clamp(1.2rem, 4vw, 2.05rem);
    font-weight: 900;
    line-height: 1;
  }

  .brand-sub {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 800;
  }

  .top-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .stat-pill {
    min-width: 92px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(26, 29, 36, 0.86);
  }

  .stat-label {
    color: var(--muted);
    display: block;
    font-size: 0.72rem;
    font-weight: 800;
  }

  .stat-value {
    color: var(--gold);
    display: block;
    font-size: 1.05rem;
    font-weight: 900;
    line-height: 1.25;
  }

  .screen {
    display: none;
  }

  .screen.is-active {
    display: block;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1.16fr) minmax(280px, 0.84fr);
    gap: 14px;
    align-items: stretch;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(26, 29, 36, 0.94);
    box-shadow: var(--shadow);
    padding: 16px;
  }

  .panel + .panel,
  .stack > * + * {
    margin-top: 12px;
  }

  .hero-panel {
    min-height: 440px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    position: relative;
  }

  .hero-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
      linear-gradient(0deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
    background-size: 36px 36px;
    opacity: 0.5;
    pointer-events: none;
  }

  .hero-copy,
  .hero-actions,
  .mini-scoreboard {
    position: relative;
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  h1 {
    max-width: 760px;
    font-size: clamp(2.8rem, 10vw, 5.4rem);
    line-height: 0.96;
    font-weight: 1000;
  }

  h2 {
    margin-bottom: 12px;
    font-size: 1.15rem;
    font-weight: 900;
  }

  .lede {
    max-width: 580px;
    margin-top: 12px;
    color: var(--muted);
    font-size: clamp(0.98rem, 2.8vw, 1.12rem);
    font-weight: 700;
  }

  .hero-actions,
  .nav-row,
  .button-grid {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .button {
    min-height: 46px;
    padding: 0 18px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--line);
    font-weight: 900;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
  }

  .button:hover {
    border-color: rgba(255, 255, 255, 0.42);
  }

  .button:active {
    transform: translateY(1px) scale(0.99);
  }

  .button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .button.teal {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: #06211e;
  }

  .button.gold {
    background: var(--gold);
    border-color: var(--gold);
    color: #2a2105;
  }

  .button.ghost {
    background: transparent;
  }

  .button.small {
    min-height: 36px;
    padding: 0 12px;
    font-size: 0.88rem;
  }

  .choice {
    flex: 1 1 98px;
    min-width: 0;
    min-height: 42px;
    padding: 0 12px;
    border-radius: 8px;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--line);
    cursor: pointer;
    font-weight: 900;
  }

  .choice.is-selected {
    border-color: var(--accent-2);
    background: rgba(25, 198, 182, 0.16);
    color: #b7fff6;
  }

  .mini-scoreboard {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .score-box {
    min-height: 86px;
    padding: 12px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .score-box strong {
    display: block;
    margin-top: 8px;
    color: var(--gold);
    font-size: 1.4rem;
    line-height: 1;
  }

  .field-list {
    display: grid;
    gap: 8px;
  }

  .player-input {
    width: 100%;
    min-height: 44px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #0f1117;
    color: var(--text);
    padding: 0 12px;
    outline: none;
  }

  .player-input:focus {
    border-color: var(--accent-2);
  }

  .game-shell {
    display: grid;
    gap: 10px;
  }

  .hud {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }

  .hud-card {
    min-height: 58px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(26, 29, 36, 0.96);
  }

  .hud-card span {
    display: block;
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 900;
  }

  .hud-card strong {
    display: block;
    overflow: hidden;
    color: var(--text);
    font-size: clamp(0.96rem, 3vw, 1.2rem);
    font-weight: 1000;
    line-height: 1.25;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .canvas-wrap {
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: #101116;
    box-shadow: var(--shadow);
  }

  #game-canvas {
    width: 100%;
    aspect-ratio: 26 / 19;
    display: block;
    cursor: pointer;
    touch-action: manipulation;
  }

  .game-actions {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
  }

  .tap-button {
    min-height: 56px;
    font-size: 1.18rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(270px, 0.9fr);
    gap: 14px;
    align-items: start;
  }

  .distance-readout {
    font-size: clamp(4rem, 16vw, 8rem);
    font-weight: 1000;
    line-height: 0.9;
    color: var(--gold);
  }

  .grade {
    margin-top: 8px;
    color: var(--accent-2);
    font-size: 1.5rem;
    font-weight: 1000;
  }

  .result-note {
    margin-top: 10px;
    color: var(--muted);
    font-weight: 800;
  }

  .list {
    display: grid;
    gap: 8px;
  }

  .shop-item,
  .achievement-item,
  .ranking-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    min-height: 64px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.04);
  }

  .shop-item h3,
  .achievement-item h3,
  .ranking-item h3 {
    font-size: 0.98rem;
    font-weight: 1000;
  }

  .shop-item p,
  .achievement-item p,
  .ranking-item p {
    margin-top: 3px;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 700;
  }

  .achievement-item.is-locked {
    opacity: 0.45;
  }

  .rank-badge {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: inline-grid;
    place-items: center;
    background: var(--surface-2);
    color: var(--gold);
    font-weight: 1000;
  }

  #toast {
    position: fixed;
    left: 50%;
    top: 18px;
    z-index: 20;
    max-width: calc(100vw - 28px);
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f6f1e8;
    color: #121212;
    box-shadow: var(--shadow);
    font-weight: 900;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -16px);
    transition: opacity 180ms ease, transform 180ms ease;
  }

  #toast.is-visible {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  @media (max-width: 820px) {
    #app {
      padding: 12px;
    }

    .topbar,
    .layout,
    .result-grid {
      grid-template-columns: 1fr;
      display: grid;
    }

    .top-stats {
      justify-content: stretch;
    }

    .stat-pill,
    .mini-scoreboard {
      min-width: 0;
    }

    .hero-panel {
      min-height: 380px;
    }

    .hud {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 520px) {
    .mini-scoreboard,
    .game-actions {
      grid-template-columns: 1fr;
    }

    .button,
    .choice {
      width: 100%;
    }
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-main">カンチョー・ダッシュ</div>
      <div class="brand-sub">KANCHO DASH</div>
    </div>
    <div class="top-stats">
      <div class="stat-pill"><span class="stat-label">BEST</span><strong class="stat-value" id="top-best">---</strong></div>
      <div class="stat-pill"><span class="stat-label">COIN</span><strong class="stat-value" id="top-coins">0</strong></div>
    </div>
  </header>

  <main>
    <section class="screen is-active" data-screen="title">
      <div class="layout">
        <div class="panel hero-panel">
          <div class="hero-copy">
            <h1>一撃で、どこまで飛ばせる。</h1>
            <p class="lede">ゲージ中央を狙って発射。飛距離、コイン、強化、対戦ランキングをまとめて遊べる版です。</p>
          </div>
          <div class="hero-actions">
            <button class="button primary" data-nav="setup">スタート</button>
            <button class="button" data-nav="shop">ショップ</button>
            <button class="button" data-nav="achievements">実績</button>
          </div>
          <div class="mini-scoreboard">
            <div class="score-box"><span class="stat-label">プレイ数</span><strong id="title-plays">0</strong></div>
            <div class="score-box"><span class="stat-label">最高連続</span><strong id="title-streak">0</strong></div>
            <div class="score-box"><span class="stat-label">実績</span><strong id="title-achievements">0/0</strong></div>
          </div>
        </div>
        <div class="stack">
          <div class="panel">
            <h2>ランキング</h2>
            <div class="list" id="home-ranking"></div>
          </div>
          <div class="panel">
            <h2>クイック操作</h2>
            <div class="nav-row">
              <button class="button teal" data-action="quick-start">1人で開始</button>
              <button class="button ghost" data-action="reset-save">セーブ初期化</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="setup">
      <div class="layout">
        <div class="panel">
          <h2>ゲーム設定</h2>
          <div class="stack">
            <div>
              <h3>人数</h3>
              <div class="button-grid" id="player-count-buttons"></div>
            </div>
            <div>
              <h3>プレイヤー名</h3>
              <div class="field-list" id="player-inputs"></div>
            </div>
            <div>
              <h3>難易度</h3>
              <div class="button-grid" id="difficulty-buttons"></div>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>現在の強化</h2>
          <div class="list" id="setup-upgrades"></div>
          <div class="nav-row" style="margin-top: 14px;">
            <button class="button primary" data-action="start-game">開始</button>
            <button class="button" data-nav="title">戻る</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="game">
      <div class="game-shell">
        <div class="hud">
          <div class="hud-card"><span>PLAYER</span><strong id="hud-player">---</strong></div>
          <div class="hud-card"><span>DISTANCE</span><strong id="hud-distance">0.0m</strong></div>
          <div class="hud-card"><span>BEST</span><strong id="hud-best">---</strong></div>
          <div class="hud-card"><span>COIN</span><strong id="hud-coins">0</strong></div>
        </div>
        <div class="canvas-wrap">
          <canvas id="game-canvas" width="520" height="380"></canvas>
        </div>
        <div class="game-actions">
          <button class="button primary tap-button" data-action="game-tap">今だ！</button>
          <button class="button ghost" data-action="finish-session">終了</button>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="result">
      <div class="result-grid">
        <div class="panel">
          <h2 id="result-title">結果</h2>
          <div class="distance-readout" id="result-distance">0.0m</div>
          <div class="grade" id="result-grade">---</div>
          <p class="result-note" id="result-note"></p>
        </div>
        <div class="panel">
          <h2>獲得</h2>
          <div class="mini-scoreboard">
            <div class="score-box"><span class="stat-label">COIN</span><strong id="result-coins">+0</strong></div>
            <div class="score-box"><span class="stat-label">COMBO</span><strong id="result-combo">0</strong></div>
            <div class="score-box"><span class="stat-label">BEST</span><strong id="result-best">---</strong></div>
          </div>
          <div class="nav-row" id="result-actions" style="margin-top: 14px;"></div>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="ranking">
      <div class="panel">
        <h2>対戦ランキング</h2>
        <div class="list" id="ranking-list"></div>
        <div class="nav-row" style="margin-top: 14px;">
          <button class="button primary" data-action="restart-session">もう一回</button>
          <button class="button" data-nav="title">終了</button>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="shop">
      <div class="layout">
        <div class="panel">
          <h2>ショップ</h2>
          <div class="list" id="shop-list"></div>
        </div>
        <div class="panel">
          <h2>所持コイン</h2>
          <div class="distance-readout" style="font-size: clamp(3rem, 12vw, 5rem);" id="shop-coins">0</div>
          <div class="nav-row">
            <button class="button primary" data-nav="setup">遊ぶ</button>
            <button class="button" data-nav="title">戻る</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="achievements">
      <div class="panel">
        <h2>実績</h2>
        <div class="list" id="achievement-list"></div>
        <div class="nav-row" style="margin-top: 14px;">
          <button class="button" data-nav="title">戻る</button>
        </div>
      </div>
    </section>
  </main>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  "use strict";

  const SAVE_KEY = "kancho_dash_save_v3";
  const OLD_SAVE_KEY = "kancho_save";
  const W = 520;
  const H = 380;
  const GROUND_Y = 292;
  const START_X = 178;
  const METER_PER_PIXEL = 0.48;

  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

  const DEFAULT_SAVE = {
    coins: 0,
    bestScore: 0,
    totalPlays: 0,
    perfectStreak: 0,
    maxPerfectStreak: 0,
    achievements: {},
    upgrades: { power: 0, focus: 0, coin: 0 },
    history: []
  };

  const DIFFICULTIES = {
    easy: { label: "EASY", speed: 0.72, perfect: 0.055, good: 0.19, dual: false, variable: false, coin: 1.0 },
    normal: { label: "NORMAL", speed: 1.02, perfect: 0.046, good: 0.16, dual: false, variable: false, coin: 1.18 },
    hard: { label: "HARD", speed: 1.30, perfect: 0.038, good: 0.135, dual: false, variable: true, coin: 1.42 },
    master: { label: "MASTER", speed: 1.52, perfect: 0.035, good: 0.12, dual: true, variable: true, coin: 1.75 }
  };

  const SHOP_ITEMS = [
    {
      id: "power",
      name: "フィンガーパワー",
      desc: "飛距離ボーナス",
      max: 5,
      costs: [40, 90, 170, 320, 620],
      values: [1.08, 1.18, 1.32, 1.50, 1.75]
    },
    {
      id: "focus",
      name: "集中ゾーン",
      desc: "判定エリア拡張",
      max: 4,
      costs: [35, 85, 180, 360],
      values: [1.10, 1.20, 1.32, 1.46]
    },
    {
      id: "coin",
      name: "コイン磁石",
      desc: "獲得コイン増加",
      max: 4,
      costs: [50, 110, 240, 520],
      values: [1.15, 1.35, 1.62, 2.0]
    }
  ];

  const ACHIEVEMENTS = [
    { id: "first", name: "はじめの一撃", desc: "1回プレイする", test: () => save.totalPlays >= 1 },
    { id: "over100", name: "100mライン", desc: "100m以上飛ばす", test: (distance) => distance >= 100 },
    { id: "over250", name: "町内突破", desc: "250m以上飛ばす", test: (distance) => distance >= 250 },
    { id: "over500", name: "空の向こう", desc: "500m以上飛ばす", test: (distance) => distance >= 500 },
    { id: "perfect3", name: "PERFECT 3連", desc: "PERFECTを3連続", test: () => save.maxPerfectStreak >= 3 },
    { id: "plays10", name: "やり込み開始", desc: "10回プレイする", test: () => save.totalPlays >= 10 },
    { id: "coin300", name: "貯金上手", desc: "コインを300枚ためる", test: () => save.coins >= 300 },
    { id: "maxPower", name: "究極の一撃", desc: "フィンガーパワーを最大強化", test: () => getUpgradeLevel("power") >= 5 }
  ];

  let save = loadSave();
  let config = {
    playerCount: 1,
    playerNames: ["プレイヤー1"],
    difficulty: "easy"
  };
  let session = {
    current: 0,
    players: [],
    scores: []
  };
  let game = null;
  let animationFrame = 0;
  let lastTime = 0;
  let toastTimer = 0;

  const canvas = $("#game-canvas");
  const ctx = canvas.getContext("2d");

  function loadSave() {
    const merged = structuredClone(DEFAULT_SAVE);
    try {
      const oldRaw = localStorage.getItem(OLD_SAVE_KEY);
      if (oldRaw) {
        const old = JSON.parse(oldRaw);
        if (Number.isFinite(old.coins)) merged.coins = old.coins;
        if (Number.isFinite(old.bestScore)) merged.bestScore = old.bestScore;
        if (Number.isFinite(old.totalPlays)) merged.totalPlays = old.totalPlays;
      }
    } catch (_) {
      // Ignore old malformed saves.
    }
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return normalizeSave(merged);
      return normalizeSave({ ...merged, ...JSON.parse(raw) });
    } catch (_) {
      return normalizeSave(merged);
    }
  }

  function normalizeSave(data) {
    const safe = structuredClone(DEFAULT_SAVE);
    safe.coins = Math.max(0, Number(data.coins) || 0);
    safe.bestScore = Math.max(0, Number(data.bestScore) || 0);
    safe.totalPlays = Math.max(0, Number(data.totalPlays) || 0);
    safe.perfectStreak = Math.max(0, Number(data.perfectStreak) || 0);
    safe.maxPerfectStreak = Math.max(0, Number(data.maxPerfectStreak) || 0);
    safe.achievements = typeof data.achievements === "object" && data.achievements ? data.achievements : {};
    safe.upgrades = { ...safe.upgrades, ...(typeof data.upgrades === "object" && data.upgrades ? data.upgrades : {}) };
    safe.history = Array.isArray(data.history) ? data.history.slice(0, 8) : [];
    return safe;
  }

  function writeSave() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify(save));
    } catch (_) {
      // Local files can still be played without storage.
    }
  }

  function structuredClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function formatDistance(value) {
    return `${Number(value || 0).toFixed(1)}m`;
  }

  function getUpgradeLevel(id) {
    return clamp(Number(save.upgrades[id]) || 0, 0, SHOP_ITEMS.find((item) => item.id === id)?.max || 0);
  }

  function getUpgradeMultiplier(id) {
    const item = SHOP_ITEMS.find((entry) => entry.id === id);
    const level = getUpgradeLevel(id);
    if (!item || level <= 0) return 1;
    return item.values[level - 1] || 1;
  }

  function showToast(message) {
    const toast = $("#toast");
    toast.textContent = message;
    toast.classList.add("is-visible");
    clearTimeout(toastTimer);
    toastTimer = window.setTimeout(() => toast.classList.remove("is-visible"), 2100);
  }

  function showScreen(name) {
    stopAnimationIfLeaving(name);
    $$(".screen").forEach((screen) => {
      screen.classList.toggle("is-active", screen.dataset.screen === name);
    });
    renderTopStats();
    if (name === "title") renderTitle();
    if (name === "setup") renderSetup();
    if (name === "shop") renderShop();
    if (name === "achievements") renderAchievements();
  }

  function stopAnimationIfLeaving(name) {
    if (name === "game") return;
    if (animationFrame) cancelAnimationFrame(animationFrame);
    animationFrame = 0;
    lastTime = 0;
    game = null;
  }

  function renderTopStats() {
    $("#top-best").textContent = save.bestScore > 0 ? formatDistance(save.bestScore) : "---";
    $("#top-coins").textContent = Math.floor(save.coins);
  }

  function renderTitle() {
    $("#title-plays").textContent = save.totalPlays;
    $("#title-streak").textContent = save.maxPerfectStreak;
    $("#title-achievements").textContent = `${Object.keys(save.achievements).length}/${ACHIEVEMENTS.length}`;
    const ranking = $("#home-ranking");
    ranking.innerHTML = "";
    const rows = save.history.slice(0, 4);
    if (!rows.length) {
      ranking.appendChild(createEmptyRow("まだ記録がありません"));
      return;
    }
    rows.forEach((score, index) => ranking.appendChild(createRankingRow(score.name, score.distance, index + 1)));
  }

  function renderSetup() {
    renderPlayerCountButtons();
    renderPlayerInputs();
    renderDifficultyButtons();
    const list = $("#setup-upgrades");
    list.innerHTML = "";
    SHOP_ITEMS.forEach((item) => {
      const level = getUpgradeLevel(item.id);
      const row = document.createElement("div");
      row.className = "shop-item";
      row.innerHTML = `<div><h3>${item.name}</h3><p>Lv ${level}/${item.max} ・ ${item.desc}</p></div><strong>${getUpgradeMultiplier(item.id).toFixed(2)}x</strong>`;
      list.appendChild(row);
    });
  }

  function renderPlayerCountButtons() {
    const root = $("#player-count-buttons");
    root.innerHTML = "";
    [1, 2, 3, 4].forEach((count) => {
      const button = document.createElement("button");
      button.className = `choice${config.playerCount === count ? " is-selected" : ""}`;
      button.type = "button";
      button.dataset.players = String(count);
      button.textContent = `${count}人`;
      root.appendChild(button);
    });
  }

  function renderPlayerInputs() {
    const root = $("#player-inputs");
    root.innerHTML = "";
    for (let i = 0; i < config.playerCount; i += 1) {
      const input = document.createElement("input");
      input.className = "player-input";
      input.type = "text";
      input.maxLength = 12;
      input.value = config.playerNames[i] || `プレイヤー${i + 1}`;
      input.placeholder = `プレイヤー${i + 1}`;
      input.dataset.playerName = String(i);
      root.appendChild(input);
    }
  }

  function renderDifficultyButtons() {
    const root = $("#difficulty-buttons");
    root.innerHTML = "";
    Object.entries(DIFFICULTIES).forEach(([id, diff]) => {
      const button = document.createElement("button");
      button.className = `choice${config.difficulty === id ? " is-selected" : ""}`;
      button.type = "button";
      button.dataset.diff = id;
      button.textContent = diff.label;
      root.appendChild(button);
    });
  }

  function renderShop() {
    $("#shop-coins").textContent = Math.floor(save.coins);
    const list = $("#shop-list");
    list.innerHTML = "";
    SHOP_ITEMS.forEach((item) => {
      const level = getUpgradeLevel(item.id);
      const maxed = level >= item.max;
      const cost = maxed ? 0 : item.costs[level];
      const row = document.createElement("div");
      row.className = "shop-item";
      const current = getUpgradeMultiplier(item.id).toFixed(2);
      row.innerHTML = `
        <div>
          <h3>${item.name}</h3>
          <p>Lv ${level}/${item.max} ・ 現在 ${current}x ・ ${item.desc}</p>
        </div>
      `;
      const button = document.createElement("button");
      button.className = `button small ${maxed ? "" : "gold"}`;
      button.type = "button";
      button.dataset.buy = item.id;
      button.disabled = maxed;
      button.textContent = maxed ? "MAX" : `${cost}C`;
      row.appendChild(button);
      list.appendChild(row);
    });
  }

  function renderAchievements() {
    const list = $("#achievement-list");
    list.innerHTML = "";
    ACHIEVEMENTS.forEach((achievement) => {
      const unlocked = Boolean(save.achievements[achievement.id]);
      const row = document.createElement("div");
      row.className = `achievement-item${unlocked ? "" : " is-locked"}`;
      row.innerHTML = `
        <div>
          <h3>${unlocked ? "達成" : "未達成"} ・ ${achievement.name}</h3>
          <p>${achievement.desc}</p>
        </div>
        <strong>${unlocked ? "OK" : "--"}</strong>
      `;
      list.appendChild(row);
    });
  }

  function createEmptyRow(text) {
    const row = document.createElement("div");
    row.className = "ranking-item";
    row.innerHTML = `<div><h3>${text}</h3><p>プレイするとここに残ります</p></div><span class="rank-badge">--</span>`;
    return row;
  }

  function createRankingRow(name, distance, rank) {
    const row = document.createElement("div");
    row.className = "ranking-item";
    row.innerHTML = `
      <div>
        <h3>${escapeHtml(name)}</h3>
        <p>${formatDistance(distance)}</p>
      </div>
      <span class="rank-badge">${rank}</span>
    `;
    return row;
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }

  function buyUpgrade(id) {
    const item = SHOP_ITEMS.find((entry) => entry.id === id);
    if (!item) return;
    const level = getUpgradeLevel(id);
    if (level >= item.max) return;
    const cost = item.costs[level];
    if (save.coins < cost) {
      showToast("コインが足りません");
      return;
    }
    save.coins -= cost;
    save.upgrades[id] = level + 1;
    checkAchievements(0);
    writeSave();
    renderShop();
    renderTopStats();
    showToast(`${item.name} Lv${level + 1}`);
  }

  function startGame() {
    session = {
      current: 0,
      players: [],
      scores: []
    };
    for (let i = 0; i < config.playerCount; i += 1) {
      const rawName = config.playerNames[i] || `プレイヤー${i + 1}`;
      session.players.push(rawName.trim() || `プレイヤー${i + 1}`);
    }
    startTurn();
  }

  function restartSession() {
    startGame();
  }

  function startTurn() {
    showScreen("game");
    $("#hud-player").textContent = session.players[session.current] || "プレイヤー";
    $("#hud-best").textContent = save.bestScore > 0 ? formatDistance(save.bestScore) : "---";
    $("#hud-coins").textContent = Math.floor(save.coins);
    $("#hud-distance").textContent = "0.0m";

    const diff = DIFFICULTIES[config.difficulty];
    game = {
      phase: "ready",
      ready: 1.2,
      diff,
      barA: 0.08,
      dirA: 1,
      barB: 0.92,
      dirB: -1,
      speedTime: 0,
      camera: 0,
      distance: 0,
      grade: "",
      gradeTimer: 0,
      settleTimer: 0,
      baseCoins: 0,
      resultShown: false,
      player: {
        x: START_X,
        y: GROUND_Y,
        vx: 0,
        vy: 0,
        rotation: 0,
        spin: 0
      },
      attacker: {
        lunge: 0
      },
      particles: []
    };

    if (animationFrame) cancelAnimationFrame(animationFrame);
    lastTime = 0;
    animationFrame = requestAnimationFrame(loop);
  }

  function finishSession() {
    showScreen("title");
  }

  function loop(time) {
    if (!game) return;
    if (!lastTime) lastTime = time;
    const dt = clamp((time - lastTime) / 1000, 0, 0.04);
    lastTime = time;
    updateGame(dt);
    drawGame();
    if (game) animationFrame = requestAnimationFrame(loop);
  }

  function updateGame(dt) {
    if (!game) return;
    const g = game;

    if (g.phase === "ready") {
      g.ready -= dt;
      if (g.ready <= 0) g.phase = "aim";
    }

    if (g.phase === "aim") {
      g.speedTime += dt;
      const wave = g.diff.variable ? 0.72 + Math.abs(Math.sin(g.speedTime * 5.2)) * 0.58 : 1;
      const step = g.diff.speed * wave * dt;
      g.barA += g.dirA * step;
      if (g.barA > 1) {
        g.barA = 1;
        g.dirA = -1;
      }
      if (g.barA < 0) {
        g.barA = 0;
        g.dirA = 1;
      }
      if (g.diff.dual) {
        g.barB += g.dirB * step * 1.22;
        if (g.barB > 1) {
          g.barB = 1;
          g.dirB = -1;
        }
        if (g.barB < 0) {
          g.barB = 0;
          g.dirB = 1;
        }
      }
    }

    if (g.phase === "fly" || g.phase === "landed") {
      g.player.vy += 980 * dt;
      g.player.x += g.player.vx * dt;
      g.player.y += g.player.vy * dt;
      g.player.rotation += g.player.spin * dt;
      g.distance = Math.max(0, (g.player.x - START_X) * METER_PER_PIXEL);
      $("#hud-distance").textContent = formatDistance(g.distance);

      if (g.player.y >= GROUND_Y && g.player.vy > 0 && g.phase === "fly") {
        g.player.y = GROUND_Y;
        g.player.vx = 0;
        g.player.vy = 0;
        g.player.spin = 0;
        g.phase = "landed";
        g.settleTimer = 1.05;
        addLandingDust(g.player.x, g.player.y);
      }

      if (g.phase === "landed") {
        g.settleTimer -= dt;
        if (g.settleTimer <= 0 && !g.resultShown) showResult();
      }
    }

    if (g.attacker.lunge > 0) {
      g.attacker.lunge = Math.max(0, g.attacker.lunge - dt * 1.8);
    }

    const cameraTarget = Math.max(0, g.player.x - W * 0.58);
    g.camera += (cameraTarget - g.camera) * clamp(dt * 8, 0, 1);

    g.gradeTimer = Math.max(0, g.gradeTimer - dt);
    updateParticles(dt);
  }

  function updateParticles(dt) {
    if (!game) return;
    game.particles.forEach((particle) => {
      particle.x += particle.vx * dt;
      particle.y += particle.vy * dt;
      particle.vy += 760 * dt;
      particle.life -= dt;
    });
    game.particles = game.particles.filter((particle) => particle.life > 0);
  }

  function gameTap() {
    if (!game || game.phase !== "aim") return;
    const diff = game.diff;
    const focus = getUpgradeMultiplier("focus");
    const perfectHalf = diff.perfect * focus;
    const goodHalf = diff.good * focus;
    const errorA = Math.abs(game.barA - 0.5);
    const errorB = diff.dual ? Math.abs(game.barB - 0.5) : 0;
    const error = Math.max(errorA, errorB);
    const accuracy = clamp(1 - error / 0.5, 0, 1);

    let grade = "MISS";
    let gradePower = 0.46;
    let baseCoins = 2;
    if (error <= perfectHalf) {
      grade = "PERFECT";
      gradePower = 1.16;
      baseCoins = 16;
      save.perfectStreak += 1;
    } else if (error <= goodHalf * 0.58) {
      grade = "GREAT";
      gradePower = 0.96;
      baseCoins = 10;
      save.perfectStreak = 0;
    } else if (error <= goodHalf) {
      grade = "GOOD";
      gradePower = 0.74;
      baseCoins = 6;
      save.perfectStreak = 0;
    } else {
      save.perfectStreak = 0;
    }

    save.maxPerfectStreak = Math.max(save.maxPerfectStreak, save.perfectStreak);
    const power = getUpgradeMultiplier("power");
    const speed = (470 + accuracy * 360) * gradePower * power;
    const angle = (35 + accuracy * 10) * Math.PI / 180;
    game.player.vx = Math.cos(angle) * speed;
    game.player.vy = -Math.sin(angle) * speed;
    game.player.spin = 3.1 + accuracy * 5.2;
    game.grade = grade;
    game.gradeTimer = 0.9;
    game.baseCoins = baseCoins;
    game.phase = "fly";
    game.attacker.lunge = 1;
    addHitBurst(START_X - 20, GROUND_Y - 58, grade);
  }

  function addHitBurst(x, y, grade) {
    const palette = grade === "PERFECT"
      ? ["#ffd166", "#fff1ad", "#19c6b6"]
      : grade === "MISS"
        ? ["#ff5a5f", "#8e8f99", "#f6f1e8"]
        : ["#19c6b6", "#9dd866", "#ffd166"];
    for (let i = 0; i < 26; i += 1) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 330;
      game.particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 90,
        life: 0.45 + Math.random() * 0.55,
        color: palette[i % palette.length],
        size: 2 + Math.random() * 4
      });
    }
  }

  function addLandingDust(x, y) {
    for (let i = 0; i < 20; i += 1) {
      game.particles.push({
        x,
        y: y - 8,
        vx: -180 + Math.random() * 360,
        vy: -180 - Math.random() * 120,
        life: 0.35 + Math.random() * 0.45,
        color: i % 2 ? "#ffd166" : "#f6f1e8",
        size: 2 + Math.random() * 5
      });
    }
  }

  function drawGame() {
    if (!game) return;
    ctx.clearRect(0, 0, W, H);
    drawBackdrop();
    drawWorld();
    drawHudOverlay();
  }

  function drawBackdrop() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, "#191b25");
    sky.addColorStop(0.62, "#292b36");
    sky.addColorStop(1, "#15161c");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = "rgba(255,255,255,0.06)";
    ctx.lineWidth = 1;
    for (let x = -20; x < W + 40; x += 34) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x - 60, H);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawWorld() {
    const g = game;
    const camera = g.camera;
    drawCity(camera * 0.28);
    drawGround(camera);
    drawDistanceMarkers(camera);

    ctx.save();
    ctx.translate(-camera, 0);
    drawAttacker(92, GROUND_Y, g.attacker.lunge);
    drawTarget(g.player.x, g.player.y, g.phase === "fly" || g.phase === "landed", g.player.rotation);
    drawParticles(camera);
    ctx.restore();

    drawTimingBar();
  }

  function drawCity(offset) {
    ctx.save();
    ctx.translate(-offset % 160, 0);
    const colors = ["#262a34", "#303440", "#20242d"];
    for (let i = -1; i < 7; i += 1) {
      const x = i * 160;
      const w = 74 + (i % 3) * 18;
      const h = 78 + ((i + 2) % 4) * 18;
      ctx.fillStyle = colors[(i + 3) % colors.length];
      ctx.fillRect(x, GROUND_Y - 112 - h, w, h + 112);
      ctx.fillStyle = "rgba(255, 209, 102, 0.22)";
      for (let wx = x + 12; wx < x + w - 10; wx += 20) {
        for (let wy = GROUND_Y - 96 - h; wy < GROUND_Y - 34; wy += 24) {
          ctx.fillRect(wx, wy, 7, 10);
        }
      }
    }
    ctx.restore();
  }

  function drawGround(camera) {
    ctx.fillStyle = "#14161b";
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = "#242833";
    ctx.fillRect(0, GROUND_Y + 16, W, 12);
    ctx.strokeStyle = "#ffd166";
    ctx.setLineDash([16, 14]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo((-camera * 0.55) % 30, GROUND_Y + 52);
    ctx.lineTo(W, GROUND_Y + 52);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawDistanceMarkers(camera) {
    ctx.save();
    ctx.translate(-camera, 0);
    ctx.font = "900 12px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    for (let meter = 0; meter <= Math.max(1200, game.distance + 260); meter += 50) {
      const x = START_X + meter / METER_PER_PIXEL;
      if (x < camera - 40 || x > camera + W + 40) continue;
      ctx.strokeStyle = meter % 100 === 0 ? "#ffd166" : "#555d6d";
      ctx.lineWidth = meter % 100 === 0 ? 3 : 1;
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y - 8);
      ctx.lineTo(x, GROUND_Y + 24);
      ctx.stroke();
      ctx.fillStyle = meter % 100 === 0 ? "#ffd166" : "#a7abb6";
      ctx.fillText(`${meter}m`, x, GROUND_Y + 28);
    }
    ctx.restore();
  }

  function drawTimingBar() {
    if (!game || (game.phase !== "aim" && game.phase !== "fly")) return;
    const diff = game.diff;
    const focus = getUpgradeMultiplier("focus");
    const x = 74;
    const y = 326;
    const width = 372;
    const height = 24;
    const perfect = diff.perfect * focus * 2 * width;
    const good = diff.good * focus * 2 * width;

    ctx.save();
    ctx.fillStyle = "rgba(17,18,22,0.88)";
    roundedRect(x - 14, y - 28, width + 28, 62, 8, true);
    ctx.fillStyle = "#303440";
    roundedRect(x, y, width, height, 8, true);
    ctx.fillStyle = "rgba(25,198,182,0.26)";
    roundedRect(x + width / 2 - good / 2, y, good, height, 6, true);
    ctx.fillStyle = "rgba(255,209,102,0.62)";
    roundedRect(x + width / 2 - perfect / 2, y - 1, perfect, height + 2, 6, true);
    drawBarNeedle(x + game.barA * width, y, "#ff5a5f");
    if (diff.dual) drawBarNeedle(x + game.barB * width, y, "#9dd866");
    ctx.fillStyle = "#f6f1e8";
    ctx.font = "900 12px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(game.phase === "aim" ? "TAP" : game.grade, x + width / 2, y - 10);
    ctx.restore();
  }

  function drawBarNeedle(x, y, color) {
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    roundedRect(x - 5, y - 5, 10, 34, 5, true);
    ctx.shadowBlur = 0;
  }

  function drawHudOverlay() {
    if (game.phase === "ready") {
      const count = Math.max(1, Math.ceil(game.ready * 3));
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.30)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#f6f1e8";
      ctx.font = "1000 76px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(count === 1 ? "GO" : String(count - 1), W / 2, H / 2 - 8);
      ctx.restore();
    }

    if (game.gradeTimer > 0) {
      ctx.save();
      const scale = 1 + (0.9 - game.gradeTimer) * 0.45;
      ctx.translate(W / 2, 118);
      ctx.scale(scale, scale);
      ctx.globalAlpha = clamp(game.gradeTimer / 0.22, 0, 1);
      ctx.font = "1000 42px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillStyle = game.grade === "PERFECT" ? "#ffd166" : game.grade === "MISS" ? "#ff5a5f" : "#19c6b6";
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 18;
      ctx.fillText(game.grade, 0, 0);
      ctx.restore();
    }
  }

  function drawAttacker(x, y, lunge) {
    ctx.save();
    ctx.translate(x + lunge * 34, y);

    ctx.fillStyle = "#263044";
    roundedRect(-14, -54, 28, 42, 8, true);
    ctx.fillStyle = "#f0ae6b";
    circle(0, -68, 15);
    ctx.fillStyle = "#16171c";
    circle(-5, -70, 2);
    circle(5, -70, 2);
    ctx.strokeStyle = "#16171c";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-5, -62);
    ctx.quadraticCurveTo(0, -58, 7, -62);
    ctx.stroke();

    ctx.strokeStyle = "#f0ae6b";
    ctx.lineWidth = 8;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(14, -42);
    ctx.quadraticCurveTo(28 + lunge * 18, -50, 46 + lunge * 24, -49);
    ctx.stroke();
    ctx.strokeStyle = "#ffe0a6";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(44 + lunge * 24, -53);
    ctx.lineTo(58 + lunge * 26, -56);
    ctx.moveTo(44 + lunge * 24, -47);
    ctx.lineTo(58 + lunge * 26, -44);
    ctx.stroke();

    ctx.fillStyle = "#111216";
    roundedRect(-13, -14, 10, 23, 5, true);
    roundedRect(4, -14, 10, 23, 5, true);
    ctx.restore();
  }

  function drawTarget(x, y, flying, rotation) {
    ctx.save();
    ctx.translate(x, y);

    if (flying) {
      ctx.rotate(rotation);
      ctx.fillStyle = "#ffcf8c";
      circle(15, -36, 12);
      ctx.fillStyle = "#42a5f5";
      roundedRect(-20, -38, 34, 22, 10, true);
      ctx.fillStyle = "#ff5a5f";
      roundedRect(-23, -19, 28, 18, 9, true);
      ctx.fillStyle = "#1d2430";
      roundedRect(-25, -2, 10, 24, 5, true);
      roundedRect(-6, -2, 10, 24, 5, true);
      ctx.fillStyle = "#111216";
      circle(19, -39, 2);
      circle(10, -38, 2);
      ctx.restore();
      return;
    }

    ctx.rotate(-0.02);
    ctx.fillStyle = "#1d2430";
    roundedRect(-4, -11, 9, 25, 5, true);
    roundedRect(16, -11, 9, 25, 5, true);

    ctx.fillStyle = "#ff5a5f";
    ctx.beginPath();
    ctx.ellipse(-10, -28, 19, 15, -0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.20)";
    ctx.beginPath();
    ctx.ellipse(-17, -33, 7, 5, -0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(13, -42);
    ctx.rotate(0.43);
    ctx.fillStyle = "#42a5f5";
    roundedRect(-6, -10, 38, 22, 9, true);
    ctx.restore();

    ctx.fillStyle = "#ffcf8c";
    circle(48, -41, 13);
    ctx.fillStyle = "#111216";
    circle(52, -43, 2);
    ctx.strokeStyle = "#111216";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(44, -35);
    ctx.quadraticCurveTo(50, -31, 57, -35);
    ctx.stroke();

    ctx.strokeStyle = "#ffcf8c";
    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(24, -35);
    ctx.lineTo(42, -25);
    ctx.stroke();
    ctx.restore();
  }

  function drawParticles(camera) {
    game.particles.forEach((particle) => {
      ctx.globalAlpha = clamp(particle.life * 2, 0, 1);
      ctx.fillStyle = particle.color;
      circle(particle.x, particle.y, particle.size);
    });
    ctx.globalAlpha = 1;
  }

  function roundedRect(x, y, width, height, radius, fill) {
    const r = Math.min(radius, width / 2, height / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + width - r, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + r);
    ctx.lineTo(x + width, y + height - r);
    ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    ctx.lineTo(x + r, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    if (fill) ctx.fill();
  }

  function circle(x, y, radius) {
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  function showResult() {
    if (!game || game.resultShown) return;
    game.resultShown = true;
    const distance = Number(game.distance.toFixed(1));
    const grade = game.grade || "MISS";
    const coins = Math.max(1, Math.round((game.baseCoins + distance / 38) * getUpgradeMultiplier("coin") * game.diff.coin));
    const isNewBest = distance > save.bestScore;
    save.coins += coins;
    save.totalPlays += 1;
    if (isNewBest) save.bestScore = distance;
    save.history.unshift({ name: session.players[session.current], distance, grade });
    save.history = save.history
      .sort((a, b) => b.distance - a.distance)
      .slice(0, 8);
    checkAchievements(distance);
    writeSave();

    session.scores.push({ name: session.players[session.current], distance, grade });

    $("#result-title").textContent = `${session.players[session.current]} の結果`;
    $("#result-distance").textContent = formatDistance(distance);
    $("#result-grade").textContent = grade;
    $("#result-note").textContent = isNewBest ? "自己ベスト更新です。" : "次はもっと中央を狙えます。";
    $("#result-coins").textContent = `+${coins}`;
    $("#result-combo").textContent = save.perfectStreak;
    $("#result-best").textContent = formatDistance(save.bestScore);
    renderResultActions();
    showScreen("result");
  }

  function renderResultActions() {
    const root = $("#result-actions");
    root.innerHTML = "";
    const isLast = session.current >= session.players.length - 1;
    if (!isLast) {
      root.appendChild(makeButton(`次: ${session.players[session.current + 1]}`, "primary", () => {
        session.current += 1;
        startTurn();
      }));
    } else if (session.players.length > 1) {
      root.appendChild(makeButton("ランキング", "teal", showRanking));
    }
    root.appendChild(makeButton("もう一回", "gold", restartSession));
    root.appendChild(makeButton("終了", "", () => showScreen("title")));
  }

  function makeButton(text, tone, onClick) {
    const button = document.createElement("button");
    button.type = "button";
    button.className = `button ${tone}`.trim();
    button.textContent = text;
    button.addEventListener("click", onClick);
    return button;
  }

  function showRanking() {
    showScreen("ranking");
    const list = $("#ranking-list");
    list.innerHTML = "";
    [...session.scores]
      .sort((a, b) => b.distance - a.distance)
      .forEach((score, index) => list.appendChild(createRankingRow(score.name, score.distance, index + 1)));
  }

  function checkAchievements(distance) {
    let changed = false;
    ACHIEVEMENTS.forEach((achievement) => {
      if (!save.achievements[achievement.id] && achievement.test(distance)) {
        save.achievements[achievement.id] = true;
        changed = true;
        showToast(`実績解除: ${achievement.name}`);
      }
    });
    return changed;
  }

  function resetSave() {
    if (!window.confirm("セーブデータを初期化しますか？")) return;
    save = structuredClone(DEFAULT_SAVE);
    writeSave();
    renderTopStats();
    renderTitle();
    showToast("セーブを初期化しました");
  }

  document.addEventListener("click", (event) => {
    const button = event.target.closest("button");
    if (!button) return;
    if (button.dataset.nav) showScreen(button.dataset.nav);
    if (button.dataset.players) {
      config.playerCount = Number(button.dataset.players);
      renderSetup();
    }
    if (button.dataset.diff) {
      config.difficulty = button.dataset.diff;
      renderDifficultyButtons();
    }
    if (button.dataset.buy) buyUpgrade(button.dataset.buy);
    if (button.dataset.action === "start-game") startGame();
    if (button.dataset.action === "restart-session") restartSession();
    if (button.dataset.action === "quick-start") {
      config.playerCount = 1;
      config.playerNames[0] = config.playerNames[0] || "プレイヤー1";
      startGame();
    }
    if (button.dataset.action === "game-tap") gameTap();
    if (button.dataset.action === "finish-session") finishSession();
    if (button.dataset.action === "reset-save") resetSave();
  });

  document.addEventListener("input", (event) => {
    const input = event.target.closest("[data-player-name]");
    if (!input) return;
    config.playerNames[Number(input.dataset.playerName)] = input.value;
  });

  document.addEventListener("keydown", (event) => {
    if (!game || $(".screen.is-active")?.dataset.screen !== "game") return;
    if (event.code === "Space" || event.code === "Enter") {
      event.preventDefault();
      gameTap();
    }
    if (event.code === "Escape") {
      event.preventDefault();
      finishSession();
    }
  });

  canvas.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    gameTap();
  });

  renderTopStats();
  renderTitle();
})();
</script>
</body>
</html>
