<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カンチョーマスター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a12;
    --primary: #ff3d5a;
    --yellow: #ffe94d;
    --cyan: #00f5d4;
    --purple: #9b5de5;
    --white: #f0f0f0;
    --panel: #14141f;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(155,93,229,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,61,90,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  #app {
    width: 100%;
    max-width: 480px;
    padding: 0 12px;
    position: relative;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; align-items: center; gap: 20px; }
  .screen.active { display: flex; }

  /* TITLE */
  .title-logo {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 3rem;
    line-height: 1;
    text-align: center;
    background: linear-gradient(135deg, var(--primary), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(255,61,90,0.5));
  }

  .title-sub {
    font-size: 0.9rem;
    color: #888;
    letter-spacing: 0.2em;
  }

  .btn {
    padding: 14px 36px;
    border: none;
    border-radius: 12px;
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    letter-spacing: 0.05em;
  }
  .btn:active { transform: scale(0.95); }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #ff6b3d);
    color: white;
    filter: drop-shadow(0 4px 12px rgba(255,61,90,0.4));
  }
  .btn-primary:hover { filter: drop-shadow(0 4px 20px rgba(255,61,90,0.7)); }

  .btn-secondary {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--white);
  }

  .btn-cyan {
    background: linear-gradient(135deg, var(--cyan), #00b4d8);
    color: #000;
  }

  .btn-yellow {
    background: linear-gradient(135deg, var(--yellow), #ffb700);
    color: #000;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
  }

  .panel-title {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 0.85rem;
    color: #888;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }

  /* SETUP */
  .setup-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .choice-btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .choice-btn.selected {
    border-color: var(--primary);
    background: rgba(255,61,90,0.15);
    color: var(--primary);
  }

  /* GAME CANVAS */
  #gameCanvas {
    border-radius: 16px;
    border: 1px solid var(--border);
    display: block;
    width: 100%;
    cursor: pointer;
    touch-action: manipulation;
  }

  /* HUD */
  .hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }

  .hud-item {
    text-align: center;
  }

  .hud-label {
    font-size: 0.7rem;
    color: #888;
    letter-spacing: 0.1em;
  }

  .hud-value {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 1.2rem;
    color: var(--yellow);
  }

  .coin-display {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 1rem;
    color: var(--yellow);
  }

  /* RESULT */
  .result-distance {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 3.5rem;
    background: linear-gradient(135deg, var(--cyan), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  .result-label { font-size: 0.8rem; color: #888; letter-spacing: 0.2em; }

  .ranking-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }
  .ranking-row:last-child { border-bottom: none; }
  .ranking-row.winner { color: var(--yellow); }

  .rank-num {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 1.4rem;
    width: 36px;
    color: #555;
  }
  .rank-num.gold { color: var(--yellow); }
  .rank-num.silver { color: #aaa; }
  .rank-num.bronze { color: #cd7f32; }

  /* SHOP */
  .shop-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .shop-item:last-child { border-bottom: none; }

  .shop-name { font-weight: 700; font-size: 0.95rem; }
  .shop-desc { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .shop-level { font-family: 'Dela Gothic One', sans-serif; font-size: 0.8rem; color: var(--cyan); }

  .btn-small {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: transform 0.1s;
    white-space: nowrap;
  }
  .btn-small:active { transform: scale(0.95); }
  .btn-buy { background: var(--yellow); color: #000; }
  .btn-max { background: var(--border); color: #888; cursor: default; }

  /* ACHIEVEMENT */
  .achievement-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    opacity: 0.4;
    transition: opacity 0.3s;
  }
  .achievement-item.unlocked { opacity: 1; }
  .achievement-icon { font-size: 1.5rem; }
  .achievement-name { font-weight: 700; font-size: 0.9rem; }
  .achievement-desc { font-size: 0.75rem; color: #888; }

  /* TOAST */
  #toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 1rem;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1000;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Player name inputs */
  .player-inputs { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .player-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .player-input:focus { border-color: var(--primary); }

  .diff-bar {
    display: flex;
    gap: 6px;
    width: 100%;
    justify-content: center;
  }

  .nav-row {
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>
<div id="app">

  <!-- TITLE SCREEN -->
  <div class="screen active" id="screen-title">
    <div class="title-logo">カンチョー<br>マスター</div>
    <div class="title-sub">KANCHO MASTER</div>
    <div class="panel" style="text-align:center">
      <div class="panel-title">BEST SCORE</div>
      <div id="title-best" style="font-family:'Dela Gothic One',sans-serif;font-size:2rem;color:var(--cyan)">---</div>
    </div>
    <button class="btn btn-primary" onclick="goTo('screen-setup')">ゲームスタート</button>
    <div class="nav-row">
      <button class="btn btn-secondary" onclick="goTo('screen-shop')">🛒 ショップ</button>
      <button class="btn btn-secondary" onclick="goTo('screen-achievements')">🏆 実績</button>
    </div>
  </div>

  <!-- SETUP SCREEN -->
  <div class="screen" id="screen-setup">
    <div class="title-logo" style="font-size:2rem">ゲーム設定</div>

    <div class="panel">
      <div class="panel-title">プレイヤー人数</div>
      <div class="setup-row" id="player-count-btns">
        <button class="choice-btn selected" onclick="selectPlayers(1)">1人</button>
        <button class="choice-btn" onclick="selectPlayers(2)">2人</button>
        <button class="choice-btn" onclick="selectPlayers(3)">3人</button>
        <button class="choice-btn" onclick="selectPlayers(4)">4人</button>
      </div>
    </div>

    <div class="panel" id="player-names-panel">
      <div class="panel-title">プレイヤー名</div>
      <div class="player-inputs" id="player-inputs"></div>
    </div>

    <div class="panel">
      <div class="panel-title">難易度</div>
      <div class="diff-bar" id="diff-btns">
        <button class="choice-btn selected" onclick="selectDiff('EASY')">EASY</button>
        <button class="choice-btn" onclick="selectDiff('NORMAL')">NORMAL</button>
        <button class="choice-btn" onclick="selectDiff('HARD')">HARD</button>
        <button class="choice-btn" onclick="selectDiff('INSANE')">INSANE</button>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn btn-primary" onclick="startGame()">スタート！</button>
      <button class="btn btn-secondary" onclick="goTo('screen-title')">戻る</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screen-game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">PLAYER</div>
        <div class="hud-value" id="hud-player">---</div>
      </div>
      <div class="coin-display">🪙 <span id="hud-coins">0</span></div>
      <div class="hud-item">
        <div class="hud-label">BEST</div>
        <div class="hud-value" id="hud-best">---</div>
      </div>
    </div>
    <canvas id="gameCanvas" width="456" height="340"></canvas>
    <div style="font-size:0.8rem;color:#666;text-align:center">クリック / タップでカンチョー！</div>
  </div>

  <!-- RESULT (single player turn) -->
  <div class="screen" id="screen-result">
    <div class="title-logo" style="font-size:2rem" id="result-title">結果</div>
    <div class="result-label">飛距離</div>
    <div class="result-distance" id="result-distance">0m</div>
    <div class="panel" id="result-coins-panel" style="text-align:center">
      <div class="panel-title">獲得コイン</div>
      <div id="result-coins" style="font-family:'Dela Gothic One',sans-serif;font-size:2rem;color:var(--yellow)">+0</div>
    </div>
    <div id="result-actions" class="nav-row"></div>
  </div>

  <!-- RANKING SCREEN -->
  <div class="screen" id="screen-ranking">
    <div class="title-logo" style="font-size:2rem">🏆 ランキング</div>
    <div class="panel" id="ranking-list"></div>
    <div class="nav-row">
      <button class="btn btn-primary" onclick="goTo('screen-setup')">もう一度</button>
      <button class="btn btn-secondary" onclick="goTo('screen-title')">タイトルへ</button>
    </div>
  </div>

  <!-- SHOP SCREEN -->
  <div class="screen" id="screen-shop">
    <div class="title-logo" style="font-size:2rem">🛒 ショップ</div>
    <div class="coin-display" style="font-size:1.3rem">🪙 <span id="shop-coins">0</span></div>
    <div class="panel" id="shop-list"></div>
    <button class="btn btn-secondary" onclick="goTo('screen-title')">戻る</button>
  </div>

  <!-- ACHIEVEMENTS SCREEN -->
  <div class="screen" id="screen-achievements">
    <div class="title-logo" style="font-size:2rem">🏆 実績</div>
    <div class="panel" id="achievement-list"></div>
    <button class="btn btn-secondary" onclick="goTo('screen-title')">戻る</button>
  </div>

</div>

<div id="toast">🎉 実績解除！</div>

<script>
// =====================
// SAVE DATA
// =====================
const SAVE_KEY = 'kancho_save';
let save = {
  coins: 0,
  bestScore: 0,
  totalPlays: 0,
  perfectStreak: 0,
  maxPerfectStreak: 0,
  achievements: {},
  upgrades: { fingerPower: 0 }
};

function loadSave() {
  try {
    const d = localStorage.getItem(SAVE_KEY);
    if (d) save = { ...save, ...JSON.parse(d) };
  } catch(e) {}
}

function writeSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e) {}
}

loadSave();

// =====================
// ACHIEVEMENTS
// =====================
const ACHIEVEMENTS = [
  { id: 'first_play', icon: '🎮', name: 'はじめの一歩', desc: '初めてプレイ' },
  { id: 'over100', icon: '💨', name: '100mの壁', desc: '100m以上飛ばす' },
  { id: 'over200', icon: '🚀', name: '200m超え', desc: '200m以上飛ばす' },
  { id: 'over500', icon: '🌙', name: '月まで？', desc: '500m以上飛ばす' },
  { id: 'perfect3', icon: '⚡', name: 'パーフェクトトリオ', desc: 'PERFECT 3連続' },
  { id: 'perfect10', icon: '👑', name: '神の指', desc: 'PERFECT 10連続' },
  { id: 'coin100', icon: '💰', name: 'コインマスター', desc: 'コインを100枚貯める' },
  { id: 'maxUpgrade', icon: '💪', name: '最強の指', desc: '指の強さを最大強化' },
  { id: 'plays10', icon: '🔥', name: '中毒者', desc: '10回プレイ' },
];

function unlockAchievement(id) {
  if (save.achievements[id]) return;
  save.achievements[id] = true;
  writeSave();
  const a = ACHIEVEMENTS.find(x => x.id === id);
  if (a) showToast(`${a.icon} 実績解除: ${a.name}`);
}

function checkAchievements(distance) {
  if (!save.achievements['first_play']) unlockAchievement('first_play');
  if (distance >= 100) unlockAchievement('over100');
  if (distance >= 200) unlockAchievement('over200');
  if (distance >= 500) unlockAchievement('over500');
  if (save.maxPerfectStreak >= 3) unlockAchievement('perfect3');
  if (save.maxPerfectStreak >= 10) unlockAchievement('perfect10');
  if (save.coins >= 100) unlockAchievement('coin100');
  if (save.upgrades.fingerPower >= 5) unlockAchievement('maxUpgrade');
  if (save.totalPlays >= 10) unlockAchievement('plays10');
}

// =====================
// SHOP
// =====================
const SHOP_ITEMS = [
  { id: 'fingerPower', name: '指の強さ', icon: '👆', desc: 'カンチョー威力UP！', maxLevel: 5,
    cost: [30, 60, 120, 250, 500], bonus: [1.1, 1.25, 1.45, 1.7, 2.0] }
];

function renderShop() {
  document.getElementById('shop-coins').textContent = save.coins;
  const list = document.getElementById('shop-list');
  list.innerHTML = '';
  SHOP_ITEMS.forEach(item => {
    const lv = save.upgrades[item.id] || 0;
    const maxed = lv >= item.maxLevel;
    const cost = maxed ? 0 : item.cost[lv];
    const canBuy = !maxed && save.coins >= cost;
    list.innerHTML += `
      <div class="shop-item">
        <div>
          <div class="shop-name">${item.icon} ${item.name}</div>
          <div class="shop-desc">${item.desc}</div>
          <div class="shop-level">Lv ${lv} / ${item.maxLevel} &nbsp; 倍率: ×${item.bonus[Math.max(0,lv-1)] || 1.0}</div>
        </div>
        ${maxed
          ? '<button class="btn-small btn-max">MAX</button>'
          : `<button class="btn-small btn-buy" onclick="buyUpgrade('${item.id}')" ${canBuy?'':'style="opacity:0.4;cursor:default;"'}>🪙${cost}</button>`
        }
      </div>`;
  });
}

function buyUpgrade(id) {
  const item = SHOP_ITEMS.find(x => x.id === id);
  const lv = save.upgrades[id] || 0;
  if (lv >= item.maxLevel) return;
  const cost = item.cost[lv];
  if (save.coins < cost) { showToast('コインが足りない！'); return; }
  save.coins -= cost;
  save.upgrades[id] = lv + 1;
  writeSave();
  renderShop();
  showToast(`${item.icon} ${item.name} Lv${save.upgrades[id]} にアップ！`);
  checkAchievements(0);
}

function getFingerBonus() {
  const lv = save.upgrades.fingerPower || 0;
  if (lv === 0) return 1.0;
  return SHOP_ITEMS[0].bonus[lv - 1];
}

// =====================
// GAME STATE
// =====================
let gameConfig = {
  playerCount: 1,
  playerNames: ['プレイヤー1'],
  difficulty: 'EASY'
};

const DIFF = {
  EASY:   { speed: 1.8, variableSpeed: false, dualBar: false },
  NORMAL: { speed: 2.8, variableSpeed: false, dualBar: false },
  HARD:   { speed: 3.8, variableSpeed: true,  dualBar: false },
  INSANE: { speed: 4.8, variableSpeed: true,  dualBar: true  }
};

let session = {
  currentPlayerIdx: 0,
  scores: [],
  players: []
};

let gameState = null;
let animFrame = null;
let canvas, ctx;

// =====================
// SETUP UI
// =====================
function selectPlayers(n) {
  gameConfig.playerCount = n;
  document.querySelectorAll('#player-count-btns .choice-btn').forEach((b,i) => {
    b.classList.toggle('selected', i === n - 1);
  });
  renderPlayerInputs();
}

function renderPlayerInputs() {
  const container = document.getElementById('player-inputs');
  container.innerHTML = '';
  for (let i = 0; i < gameConfig.playerCount; i++) {
    const inp = document.createElement('input');
    inp.className = 'player-input';
    inp.placeholder = `プレイヤー ${i+1} の名前`;
    inp.value = gameConfig.playerNames[i] || '';
    inp.oninput = e => { gameConfig.playerNames[i] = e.target.value; };
    container.appendChild(inp);
  }
}

function selectDiff(d) {
  gameConfig.difficulty = d;
  document.querySelectorAll('#diff-btns .choice-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === d);
  });
}

// =====================
// SCREEN NAV
// =====================
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-title') {
    const best = save.bestScore > 0 ? save.bestScore.toFixed(1) + 'm' : '---';
    document.getElementById('title-best').textContent = best;
  }
  if (id === 'screen-shop') renderShop();
  if (id === 'screen-achievements') renderAchievements();
  if (id === 'screen-setup') renderPlayerInputs();
}

function renderAchievements() {
  const list = document.getElementById('achievement-list');
  list.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const unlocked = save.achievements[a.id];
    list.innerHTML += `
      <div class="achievement-item ${unlocked ? 'unlocked' : ''}">
        <div class="achievement-icon">${a.icon}</div>
        <div>
          <div class="achievement-name">${a.name}</div>
          <div class="achievement-desc">${a.desc}</div>
        </div>
        ${unlocked ? '<span style="color:var(--cyan);font-size:1.2rem">✓</span>' : ''}
      </div>`;
  });
}

// =====================
// START GAME
// =====================
function startGame() {
  session.currentPlayerIdx = 0;
  session.scores = [];
  session.players = [];
  for (let i = 0; i < gameConfig.playerCount; i++) {
    session.players.push(gameConfig.playerNames[i] || `P${i+1}`);
  }
  startPlayerTurn();
}

function startPlayerTurn() {
  goTo('screen-game');
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  const name = session.players[session.currentPlayerIdx];
  document.getElementById('hud-player').textContent = name;
  document.getElementById('hud-coins').textContent = save.coins;
  const best = save.bestScore > 0 ? save.bestScore.toFixed(1) + 'm' : '---';
  document.getElementById('hud-best').textContent = best;

  initGameState();

  canvas.onclick = handleTap;
  canvas.ontouchstart = e => { e.preventDefault(); handleTap(); };

  if (animFrame) cancelAnimationFrame(animFrame);
  gameLoop();
}

// =====================
// GAME LOGIC
// =====================
function initGameState() {
  const diff = DIFF[gameConfig.difficulty];
  gameState = {
    phase: 'ready', // ready, bar, flying, done
    readyTimer: 90,
    bar1: { pos: 0, dir: 1 },
    bar2: { pos: 0.5, dir: -1 },
    barSpeed: diff.speed,
    variableSpeed: diff.variableSpeed,
    dualBar: diff.dualBar,
    speedTimer: 0,
    judgment: null,
    judgmentTimer: 0,
    // character
    charX: 120, charY: 220,
    velX: 0, velY: 0,
    flying: false,
    flyTime: 0,
    startX: 120, startY: 220,
    distance: 0,
    landed: false,
    landTimer: 0,
    // attacker
    atkPhase: 0, // 0=idle, 1=lunge, 2=hold
    atkTimer: 0,
    coinGain: 0,
    particles: [],
  };
}

function handleTap() {
  if (!gameState || gameState.phase !== 'bar') return;

  const b1center = Math.abs(gameState.bar1.pos - 0.5) * 2;
  let score = b1center;
  if (gameState.dualBar) {
    const b2center = Math.abs(gameState.bar2.pos - 0.5) * 2;
    score = Math.max(b1center, b2center);
  }

  // score=0 means perfect center
  const accuracy = 1 - score;

  let judgment, power, angle, coins;
  if (accuracy >= 0.9) {
    judgment = 'PERFECT!!'; power = 1.0; angle = 42; coins = 10;
    save.perfectStreak = (save.perfectStreak || 0) + 1;
  } else if (accuracy >= 0.7) {
    judgment = 'GOOD!'; power = 0.65; angle = 38; coins = 5;
    save.perfectStreak = 0;
  } else {
    judgment = 'BAD...'; power = 0.3; angle = 30; coins = 1;
    save.perfectStreak = 0;
  }

  save.maxPerfectStreak = Math.max(save.maxPerfectStreak || 0, save.perfectStreak);

  const bonus = getFingerBonus();
  const rad = angle * Math.PI / 180;
  const spd = power * 22 * bonus;

  gameState.velX = Math.cos(rad) * spd;
  gameState.velY = -Math.sin(rad) * spd;
  gameState.judgment = judgment;
  gameState.judgmentTimer = 80;
  gameState.flying = true;
  gameState.phase = 'flying';
  gameState.atkPhase = 1;
  gameState.atkTimer = 0;
  gameState.coinGain = coins;

  // particles
  for (let i = 0; i < 12; i++) {
    gameState.particles.push({
      x: gameState.charX, y: gameState.charY,
      vx: (Math.random()-0.5)*6,
      vy: -Math.random()*5-1,
      life: 40 + Math.random()*20,
      color: ['#ff3d5a','#ffe94d','#00f5d4','#ff6b3d'][Math.floor(Math.random()*4)]
    });
  }
}

let lastTime = 0;
function gameLoop(ts = 0) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  update(dt);
  draw();

  if (gameState && gameState.phase !== 'done') {
    animFrame = requestAnimationFrame(gameLoop);
  }
}

function update(dt) {
  if (!gameState) return;
  const gs = gameState;

  if (gs.phase === 'ready') {
    gs.readyTimer -= dt;
    if (gs.readyTimer <= 0) gs.phase = 'bar';
    return;
  }

  // Bar movement
  if (gs.phase === 'bar') {
    gs.speedTimer += dt;
    let spd = gs.barSpeed;
    if (gs.variableSpeed) {
      spd *= 0.8 + 0.4 * Math.abs(Math.sin(gs.speedTimer * 0.04));
    }
    const step = spd * 0.01 * dt;
    gs.bar1.pos += gs.bar1.dir * step;
    if (gs.bar1.pos >= 1) { gs.bar1.pos = 1; gs.bar1.dir = -1; }
    if (gs.bar1.pos <= 0) { gs.bar1.pos = 0; gs.bar1.dir = 1; }
    if (gs.dualBar) {
      gs.bar2.pos += gs.bar2.dir * step * 1.3;
      if (gs.bar2.pos >= 1) { gs.bar2.pos = 1; gs.bar2.dir = -1; }
      if (gs.bar2.pos <= 0) { gs.bar2.pos = 0; gs.bar2.dir = 1; }
    }
  }

  if (gs.phase === 'flying') {
    gs.flyTime += dt;
    gs.velY += 0.7 * dt; // gravity
    gs.charX += gs.velX * dt;
    gs.charY += gs.velY * dt;

    if (gs.charY >= 220 && gs.flyTime > 5) {
      gs.charY = 220;
      gs.velX = 0; gs.velY = 0;
      gs.landed = true;
      gs.landTimer = 90;
      gs.distance = Math.max(0, (gs.charX - gs.startX) * 0.8);
      gs.phase = 'done';
    }

    // clamp X for canvas but track real distance
    if (gs.charX > 1800) gs.charX = 1800;
  }

  if (gs.judgmentTimer > 0) gs.judgmentTimer -= dt;

  // Attacker anim
  if (gs.atkPhase === 1) {
    gs.atkTimer += dt;
    if (gs.atkTimer > 15) { gs.atkPhase = 2; gs.atkTimer = 0; }
  }

  // Particles
  gs.particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.2 * dt;
    p.life -= dt;
  });
  gs.particles = gs.particles.filter(p => p.life > 0);

  if (gs.phase === 'done' && gs.landTimer > 0) {
    gs.landTimer -= dt;
    if (gs.landTimer <= 0) showResult();
  }
}

// =====================
// DRAW
// =====================
function draw() {
  if (!canvas || !ctx || !gameState) return;
  const gs = gameState;
  const W = canvas.width, H = canvas.height;

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Ground
  const grad = ctx.createLinearGradient(0, 230, 0, H);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 230, W, H - 230);

  // Ground line
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 232);
  ctx.lineTo(W, 232);
  ctx.stroke();

  // Distance markers
  ctx.fillStyle = '#2a2a4a';
  ctx.font = '10px Noto Sans JP';
  for (let m = 50; m <= 400; m += 50) {
    const x = gs.startX + m / 0.8;
    if (x < W) {
      ctx.fillRect(x, 228, 1, 8);
      ctx.fillText(m + 'm', x - 10, 250);
    }
  }

  // Particles
  gs.particles.forEach(p => {
    ctx.globalAlpha = p.life / 60;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw attacker (left side, fixed)
  drawAttacker(60, 190, gs.atkPhase, gs.atkTimer);

  // Draw flying character
  drawCharacter(Math.min(gs.charX, W - 30), gs.charY, gs.flying, gs.flyTime);

  // READY countdown
  if (gs.phase === 'ready') {
    const t = Math.ceil(gs.readyTimer / 30);
    ctx.save();
    ctx.globalAlpha = gs.readyTimer % 30 < 15 ? 1 : 0.5;
    ctx.fillStyle = '#fff';
    ctx.font = "bold 80px 'Dela Gothic One'";
    ctx.textAlign = 'center';
    ctx.fillText(t > 0 ? t : 'GO!', W/2, H/2 + 20);
    ctx.restore();
  }

  // Timing bar
  if (gs.phase === 'bar' || gs.phase === 'flying') {
    drawTimingBar(gs);
  }

  // Judgment text
  if (gs.judgmentTimer > 0) {
    const alpha = Math.min(1, gs.judgmentTimer / 20);
    const scale = 1 + (1 - gs.judgmentTimer / 80) * 0.3;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W/2, 120);
    ctx.scale(scale, scale);
    ctx.font = "bold 42px 'Dela Gothic One'";
    ctx.textAlign = 'center';
    const colors = { 'PERFECT!!': '#ffe94d', 'GOOD!': '#00f5d4', 'BAD...': '#ff3d5a' };
    ctx.fillStyle = colors[gs.judgment] || '#fff';
    ctx.shadowColor = colors[gs.judgment] || '#fff';
    ctx.shadowBlur = 20;
    ctx.fillText(gs.judgment, 0, 0);
    ctx.restore();
  }

  // Distance display while flying
  if (gs.flying && gs.charX > gs.startX) {
    const dist = ((gs.charX - gs.startX) * 0.8).toFixed(1);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = "bold 16px 'Dela Gothic One'";
    ctx.textAlign = 'center';
    ctx.fillText(dist + 'm', Math.min(gs.charX, W-30), gs.charY - 30);
  }
}

function drawTimingBar(gs) {
  const bx = 80, by = 300, bw = 296, bh = 22;

  // Bar background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 11);
  ctx.fill();

  // Perfect zone
  const pzW = bw * 0.1;
  const pzX = bx + bw * 0.5 - pzW/2;
  ctx.fillStyle = 'rgba(255,233,77,0.3)';
  ctx.beginPath();
  ctx.roundRect(pzX, by, pzW, bh, 4);
  ctx.fill();

  // Good zone
  const gzW = bw * 0.3;
  const gzX = bx + bw * 0.5 - gzW/2;
  ctx.fillStyle = 'rgba(0,245,212,0.15)';
  ctx.beginPath();
  ctx.roundRect(gzX, by, gzW, bh, 4);
  ctx.fill();

  // Center line
  ctx.strokeStyle = 'rgba(255,233,77,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + bw/2, by - 3);
  ctx.lineTo(bx + bw/2, by + bh + 3);
  ctx.stroke();

  // Bar indicator 1
  const x1 = bx + gs.bar1.pos * bw;
  ctx.fillStyle = '#ff3d5a';
  ctx.shadowColor = '#ff3d5a';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.roundRect(x1 - 5, by - 2, 10, bh + 4, 5);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Bar indicator 2 (INSANE)
  if (gs.dualBar) {
    const x2 = bx + gs.bar2.pos * bw;
    ctx.fillStyle = '#9b5de5';
    ctx.shadowColor = '#9b5de5';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.roundRect(x2 - 5, by - 2, 10, bh + 4, 5);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Border
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 11);
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#ffe94d';
  ctx.font = "10px 'Dela Gothic One'";
  ctx.textAlign = 'center';
  ctx.fillText('PERFECT', bx + bw/2, by - 6);
}

function drawCharacter(x, y, flying, t) {
  ctx.save();
  ctx.translate(x, y);
  if (flying) {
    const angle = Math.atan2(gameState.velY, gameState.velX);
    ctx.rotate(angle);
  }

  // Body
  ctx.fillStyle = '#5588ff';
  ctx.beginPath();
  ctx.roundRect(-10, -30, 20, 30, 4);
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffb347';
  ctx.beginPath();
  ctx.arc(0, -38, 12, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (wide open if flying)
  ctx.fillStyle = '#222';
  if (flying) {
    ctx.beginPath(); ctx.arc(-4, -40, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -40, 3, 0, Math.PI*2); ctx.fill();
    // Shock mouth
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -34, 4, 0, Math.PI);
    ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(-4, -39, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -39, 2, 0, Math.PI*2); ctx.fill();
  }

  // Legs
  ctx.fillStyle = '#334';
  if (!flying) {
    ctx.fillRect(-8, 0, 7, 14);
    ctx.fillRect(1, 0, 7, 14);
  } else {
    ctx.save();
    ctx.rotate(-0.4);
    ctx.fillRect(-8, 0, 7, 14);
    ctx.restore();
    ctx.save();
    ctx.rotate(0.3);
    ctx.fillRect(1, 0, 7, 14);
    ctx.restore();
  }

  ctx.restore();
}

function drawAttacker(x, y, phase, timer) {
  ctx.save();
  ctx.translate(x, y);

  const lunge = phase === 1 ? Math.min(timer / 15, 1) * 20 : (phase === 2 ? 20 : 0);

  // Body
  ctx.fillStyle = '#cc3333';
  ctx.beginPath();
  ctx.roundRect(-10 + lunge*0.3, -30, 20, 30, 4);
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffb347';
  ctx.beginPath();
  ctx.arc(lunge*0.3, -38, 12, 0, Math.PI * 2);
  ctx.fill();

  // Eyes determined
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-4 + lunge*0.3, -39, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4 + lunge*0.3, -39, 2, 0, Math.PI*2); ctx.fill();

  // Arm (the kancho finger)
  ctx.strokeStyle = '#ffb347';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(10 + lunge*0.3, -15);
  ctx.lineTo(10 + 20 + lunge, -15 + lunge*0.3);
  ctx.stroke();

  // Finger tip glow on lunge
  if (phase >= 1) {
    ctx.fillStyle = '#ffe94d';
    ctx.shadowColor = '#ffe94d';
    ctx.shadowBlur = 10 * (lunge/20);
    ctx.beginPath();
    ctx.arc(10 + 20 + lunge, -15 + lunge*0.3, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Legs
  ctx.fillStyle = '#334';
  ctx.fillRect(-8 + lunge*0.2, 0, 7, 14);
  ctx.fillRect(1 + lunge*0.2, 0, 7, 14);

  ctx.restore();
}

// =====================
// SHOW RESULT
// =====================
function showResult() {
  const gs = gameState;
  const dist = parseFloat(gs.distance.toFixed(1));
  const coins = gs.coinGain;

  save.coins += coins;
  save.totalPlays = (save.totalPlays || 0) + 1;
  if (dist > (save.bestScore || 0)) save.bestScore = dist;
  writeSave();
  checkAchievements(dist);

  session.scores.push({ name: session.players[session.currentPlayerIdx], distance: dist });

  goTo('screen-result');
  document.getElementById('result-title').textContent =
    `${session.players[session.currentPlayerIdx]} の結果`;
  document.getElementById('result-distance').textContent = dist + 'm';
  document.getElementById('result-coins').textContent = '+' + coins + ' 🪙';

  const actions = document.getElementById('result-actions');
  actions.innerHTML = '';

  const isLast = session.currentPlayerIdx >= session.players.length - 1;

  if (isLast) {
    if (session.players.length === 1) {
      actions.innerHTML = `
        <button class="btn btn-primary" onclick="startGame()">もう一度</button>
        <button class="btn btn-secondary" onclick="goTo('screen-title')">タイトル</button>`;
    } else {
      const btn = document.createElement('button');
      btn.className = 'btn btn-cyan';
      btn.textContent = '🏆 ランキングへ';
      btn.onclick = showRanking;
      actions.appendChild(btn);
    }
  } else {
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = `次: ${session.players[session.currentPlayerIdx + 1]} の番！`;
    btn.onclick = () => {
      session.currentPlayerIdx++;
      startPlayerTurn();
    };
    actions.appendChild(btn);
  }
}

function showRanking() {
  goTo('screen-ranking');
  const sorted = [...session.scores].sort((a, b) => b.distance - a.distance);
  const list = document.getElementById('ranking-list');
  const rankIcons = ['🥇', '🥈', '🥉', '4'];
  const rankClass = ['gold', 'silver', 'bronze', ''];
  list.innerHTML = '';
  sorted.forEach((s, i) => {
    list.innerHTML += `
      <div class="ranking-row ${i===0?'winner':''}">
        <div class="rank-num ${rankClass[i]}">${rankIcons[i]}</div>
        <div>${s.name}</div>
        <div style="font-family:'Dela Gothic One',sans-serif;font-size:1.2rem;color:var(--cyan)">${s.distance}m</div>
      </div>`;
  });
}

// =====================
// TOAST
// =====================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Init
renderPlayerInputs();
document.getElementById('title-best').textContent =
  save.bestScore > 0 ? save.bestScore.toFixed(1) + 'm' : '---';
</script>
